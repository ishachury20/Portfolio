<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Isha Chury | Product Designer</title>
  
  <link rel="stylesheet" href="public_html/assets/vendors/themify-icons/css/themify-icons.css">
  <link rel="stylesheet" href="public_html/assets/css/steller.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>

<body data-spy="scroll" data-target=".navbar" data-offset="40" id="home">
  
  <div class="custom-cursor"></div>

  <header class="topbar">
    <div class="brand-block">
      <h1>Isha Chury</h1>
      <p>Product Designer</p>
    </div>

    <div class="nav-wrapper">
      <nav class="floating-nav">
        <a href="#Work" class="active">Work</a>
        <a href="#Sandbox" class="nav-desktop-only">Sandbox</a>
        <a href="#About">About</a>
      </nav>

      <div class="mobile-menu-trigger" id="mobileMenuTrigger">
        <div class="at-circle">
          <span class="at-icon">@</span>
          <span class="close-icon">✕</span>
        </div>
        
        <div class="mobile-dropdown">
          <a href="#Sandbox">Sandbox</a>
          <a href="CV_IshaChury.pdf" target="_blank">Resume</a>
        </div>
      </div>
    </div>

    <div class="nav-resume-btn desktop-only">
      <a href="CV_IshaChury.pdf" target="_blank">Resume</a>
    </div>
  </header>

  <main class="site-shell">
    
    <section class="hero-window">
      <div class="hero-card-container hover-trigger">
        
        <div class="interaction-sensor"></div>

        <div class="visual-mask">
          <img src="public_html/assets/imgs/full-title-UI-2.png" alt="Isha Chury Product Design Hero" class="hero-full-img">
        </div>

        <div class="controller-wrapper">
          <img src="public_html/assets/imgs/game-controller-v2.png" alt="Interactive Controller" class="floating-controller">
        </div>

        <span class="tooltip cursor-label">Open to Work</span>
      </div>
    </section>

    <article class="case-study-card genesis-card hover-trigger" id="Work">
      
      <div class="interaction-sensor"></div>

      <a href="project-1.html" class="project-link">
        <div class="visual-mask">
          <img src="public_html/assets/imgs/genesis-container.png" class="genesis-base-img" alt="Genesis Project Base">
          
          <div class="genesis-blob blob-1"></div>
          <div class="genesis-blob blob-2"></div>
          <div class="genesis-blob blob-3"></div>

          <div class="genesis-mockup-overlay">
            <img src="public_html/assets/imgs/card-genesis-preview.png" class="mockup-img" alt="Genesis App Preview">
          </div>
        </div>
      </a>

      <span class="tooltip cursor-label">View Project</span>
    </article>

    <section id="stack" class="stack-window">
      <div class="stack-container">
        <img src="public_html/assets/imgs/stack-container.png" alt="Tech Stack Container" class="stack-bar-img">
        
        <div class="icon-overlays">
          <div class="stack-icon-wrapper icon-0">
            <img src="public_html/assets/imgs/tools-card.png" class="stack-icon" alt="Design Tools">
            <span class="tooltip">My tech stack</span>
          </div>

          <div class="icon-divider"></div>

          <div class="stack-icon-wrapper icon-1">
            <img src="public_html/assets/imgs/asana-card.png" class="stack-icon" alt="Asana">
            <span class="tooltip">Asana</span>
          </div>

          <div class="stack-icon-wrapper icon-2">
            <img src="public_html/assets/imgs/slack-card.png" class="stack-icon" alt="Slack">
            <span class="tooltip">Slack</span>
          </div>

          <div class="stack-icon-wrapper icon-3">
            <img src="public_html/assets/imgs/notion-card.png" class="stack-icon" alt="Notion">
            <span class="tooltip">Notion</span>
          </div>

          <div class="stack-icon-wrapper icon-4">
            <img src="public_html/assets/imgs/dovetail-card.png" class="stack-icon" alt="Dovetail">
            <span class="tooltip">Dovetail</span>
          </div>

          <div class="stack-icon-wrapper icon-5">
            <img src="public_html/assets/imgs/figma-card.png" class="stack-icon" alt="Figma">
            <span class="tooltip">Figma</span>
          </div>

          <div class="stack-icon-wrapper icon-6">
            <img src="public_html/assets/imgs/photoshop-card.png" class="stack-icon" alt="Photoshop">
            <span class="tooltip">Photoshop</span>
          </div>

          <div class="stack-icon-wrapper icon-7">
            <img src="public_html/assets/imgs/management-card.png" class="stack-icon" alt="Management">
            <span class="tooltip">ProtoPie</span>
          </div>

          <div class="stack-icon-wrapper icon-8">
            <img src="public_html/assets/imgs/claude-card.png" class="stack-icon" alt="Claude AI">
            <span class="tooltip">Claude</span>
          </div>

          <div class="stack-icon-wrapper icon-9">
            <img src="public_html/assets/imgs/lovable-card.png" class="stack-icon" alt="Lovable">
            <span class="tooltip">Lovable</span>
          </div>

          <div class="stack-icon-wrapper icon-10">
            <img src="public_html/assets/imgs/webflow-card.png" class="stack-icon" alt="Webflow">
            <span class="tooltip">Webflow</span>
          </div>

          <div class="stack-icon-wrapper icon-11">
            <img src="public_html/assets/imgs/vscode-card.png" class="stack-icon" alt="VS Code">
            <span class="tooltip">VS Code</span>
          </div>

          <div class="stack-icon-wrapper icon-12">
            <img src="public_html/assets/imgs/unity-card.png" class="stack-icon" alt="Unity">
            <span class="tooltip">Unity</span>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script src="public_html/assets/vendors/jquery/jquery-3.4.1.js"></script>
  <script src="public_html/assets/js/steller.js"></script>

</body>
</html>
